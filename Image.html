<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <link rel="stylesheet" href="Image.css">
</head>
<body>
    <div class="gallery-container">
        <h1>Beautiful Images</h1>
        <p>Explore our collection of stunning photographs</p>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="taekwondo">Taekwondo</button>
            <button class="filter-btn" data-filter="city">City</button>
            <button class="filter-btn" data-filter="university">University</button>
        </div>
        <div class="gallery-grid">

            <div class="gallery-item" data-category="university">
                <img src="image/TUF.jpeg" alt="university">
                <p class="caption"> The University of Faisalabad (TUF)</p>
            </div>

            <div class="gallery-item" data-category="city">
                <img src="image/Fsd.jpeg" alt="City">
                <p class="caption"> Faisalabad City</p>
            </div>

            <div class="gallery-item" data-category="taekwondo">
                <img src="image/Taekwondo1.jpeg" alt="Taekwondo">
                <p class="caption">Journey Begins </p>
            </div>

            <div class="gallery-item" data-category="university">
                <img src="image/UCP.jpg" alt="University">
                <p class="caption"> University of Central Punjab (UCP)</p>
            </div>

            <div class="gallery-item" data-category="city">
                <img src="image/Lahore.jpeg" alt="City">
                <p class="caption"> Lahore City</p>
            </div>

            <div class="gallery-item" data-category="taekwondo">
                <img src="image/Taekwondo2.jpeg" alt="Taekwondo">
                <p class="caption">Focus. Balance. Kick.</p>
            </div>

            <div class="gallery-item" data-category="university">
                <img src="image/fast1.jpeg" alt="University">
                <p class="caption"> Fast University</p>
            </div>

            <div class="gallery-item" data-category="city">
                <img src="image/Islamabad1.jpeg" alt="City">
                <p class="caption"> Islamabad City</p>
            </div>

            <div class="gallery-item" data-category="taekwondo">
                <img src="image/Taekwondo3.jpg" alt="Taekwondo">
                <p class="caption">Fight</p>
            </div>

            <div class="gallery-item" data-category="university">
                <img src="image/iqra.webp" alt="University">
                <p class="caption"> Iqra University</p>
            </div>

            <div class="gallery-item" data-category="city">
                <img src="image/Karachi.jpeg" alt="City">
                <p class="caption"> Karachi City</p>
            </div>

            <div class="gallery-item" data-category="taekwondo">
                <img src="image/taekwondo.win.webp" alt="Taekwondo">
                <p class="caption"> Win</p>
            </div>

        </div>

        <div class="lightbox" id="lightbox">
            <button class="close-btn">&times;</button>
            <button class="lightbox-prev">&#10094;</button>
            <img class="lightbox-img" src="" alt="full image">
            <p class="lightbox-caption"></p>
            <button class="lightbox-next">&#10095;</button>
        </div>
    </div>

    <script src="Image.js"></script>
</body>
</html>
